name: Build APK Release

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'Zwesta Flutter App/lib/**'
      - 'Zwesta Flutter App/android/**'
      - 'Zwesta Flutter App/pubspec.yaml'
      - 'Zwesta Flutter App/pubspec.lock'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      api_url:
        description: Backend API base URL to bake into the APK
        required: false
        default: http://148.113.5.39:9000
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEFAULT_API_URL: http://148.113.5.39:9000
    defaults:
      run:
        working-directory: Zwesta Flutter App

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Resolve Flutter app gitlink ref
        id: flutter_ref
        run: |
          APP_REF="$(git rev-parse HEAD:"Zwesta Flutter App")"
          echo "ref=$APP_REF" >> "$GITHUB_OUTPUT"
          echo "Resolved Flutter app ref: $APP_REF"

      - name: Materialize Flutter app source
        run: |
          rm -rf "Zwesta Flutter App"

      - name: Checkout Flutter app source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.flutter_ref.outputs.ref }}
          path: Zwesta Flutter App

      - name: Free disk space
        run: |
          echo "Disk space before cleanup"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo docker system prune -af || true
          echo "Disk space after cleanup"
          df -h

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;25.1.8937393"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.5
          channel: stable

      - name: Print Flutter version
        run: |
          flutter --version
          dart --version

      - name: Get dependencies
        run: |
          test -f pubspec.yaml
          flutter pub get --enforce-lockfile

      - name: Build APK
        run: |
          API_URL="${{ github.event.inputs.api_url }}"
          if [ -z "$API_URL" ]; then
            API_URL="$DEFAULT_API_URL"
          fi
          echo "Building APK with API_URL=$API_URL"
          flutter build apk --release --dart-define=API_URL="$API_URL"

      - name: Verify APK output
        run: |
          ls -la build/app/outputs/flutter-apk || true
          test -f build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zwesta-trading-apk-${{ github.run_number }}
          path: Zwesta Flutter App/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 60
