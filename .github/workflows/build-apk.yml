name: Build APK Release

on:
  push:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Backend API base URL to bake into the APK'
        required: false
        default: 'http://148.113.5.39:9000'
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEFAULT_API_URL: http://148.113.5.39:9000
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "Disk space before cleanup"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          # Removed the line that deletes the Android SDK
          # sudo rm -rf /usr/local/lib/android
          sudo docker system prune -af || true
          echo "Disk space after cleanup"
          df -h
      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          test -d "${ANDROID_HOME:-/usr/local/lib/android/sdk}"
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'
          channel: 'stable'

      - name: Print Flutter & Dart Version
        run: |
          flutter --version
          dart --version

      
      - name: Clear all caches
        run: |
          rm -rf ~/.gradle
          rm -rf android/.gradle
          rm -rf build/
          flutter clean
      
      - name: Get dependencies
        run: 'flutter pub get --enforce-lockfile'

      - name: Flutter analyze
        run: |
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings > flutter_analyze.log 2>&1
          analyze_exit=$?
          cat flutter_analyze.log
          if grep -Eq '^[[:space:]]*(warning|error) -' flutter_analyze.log; then
            echo "Analyzer reported warning/error findings"
            exit 1
          fi
          echo "Analyzer findings are info-only; continuing build"
          exit 0
      
      - name: Build APK
        run: |
          API_URL="${{ github.event.inputs.api_url }}"
          if [ -z "$API_URL" ]; then
            API_URL="$DEFAULT_API_URL"
          fi
          echo "Building APK with API_URL=$API_URL"
          flutter build apk --release \
            --dart-define=API_URL="$API_URL" \
            --verbose 2>&1 | tee build_output.log
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ]; then
            echo "=== BUILD FAILED — last 100 lines ==="
            tail -100 build_output.log
            echo "=== Gradle error summary ==="
            grep -E "(error:|FAILED|Exception|Could not|> Task|Caused by)" build_output.log | tail -40 || true
            exit $exit_code
          fi
      
      - name: Get commit info
        id: commit
        run: |
          echo "message=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: apk-${{ github.run_number }}
          name: APK Build ${{ github.run_number }}
          body: |
            APK build for commit `${{ github.sha }}`.

            Commit: ${{ steps.commit.outputs.short_sha }}
            Author: ${{ steps.commit.outputs.author }}
            Message: ${{ steps.commit.outputs.message }}
            API URL: ${{ github.event.inputs.api_url || 'http://148.113.5.39:9000' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: zwesta-trading-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 60

