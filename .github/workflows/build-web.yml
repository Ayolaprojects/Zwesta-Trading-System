name: Build & Deploy Web

on:
  push:
    branches: [ main, pre-2026-06-04-app ]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'pubspec.yaml'
      - '.github/workflows/build-web.yml'
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Backend API URL (use ngrok/localhost tunnel for local testing)'
        required: false
        default: ''
        type: string
      environment:
        description: 'Environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development
      offline_mode:
        description: 'Enable offline mode (uses mock data, no backend needed)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEFAULT_API_URL: http://148.113.5.39:9000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'
          channel: 'stable'

      - name: Clean & get dependencies
        run: |
          flutter clean
          flutter pub get --enforce-lockfile

      - name: Flutter analyze
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Get commit info
        id: commit
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT

      - name: Build release web
        run: |
          API_URL="${{ github.event.inputs.api_url }}"
          if [ -z "$API_URL" ]; then API_URL="$DEFAULT_API_URL"; fi
          OFFLINE="${{ github.event.inputs.offline_mode }}"
          echo "Building with API_URL=$API_URL, OFFLINE_MODE=$OFFLINE"
          flutter build web --release \
            --dart-define=API_URL="$API_URL" \
            --dart-define=OFFLINE_MODE="$OFFLINE" \
            --dart-define=RELEASE_VERSION="${{ github.run_number }}"

      - name: Delete existing release if present
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="web-v${{ github.run_number }}"
          echo "Checking for existing release: $TAG"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          if [ "$RESPONSE" = "200" ]; then
            echo "Release $TAG exists — deleting before creating new one"
            RELEASE_ID=$(curl -s \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" | grep '"id"' | head -1 | sed -E 's/.*"id": *([0-9]+).*/\1/')
            curl -s -X DELETE \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            echo "Deleted release $TAG (id=$RELEASE_ID)"
            echo "Waiting 10s for GitHub release propagation before recreating..."
            sleep 10
          else
            echo "No existing release $TAG found (HTTP $RESPONSE) — proceeding"
          fi

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: web-v${{ github.run_number }}
          name: "Zwesta Web v${{ github.run_number }}"
          body: |
            ## Zwesta Trading Web — Build ${{ github.run_number }}

            **Commit:** `${{ steps.commit.outputs.short_sha }}` by ${{ steps.commit.outputs.author }}
            **API URL:** ${{ github.event.inputs.api_url || env.DEFAULT_API_URL }}
            **Offline Mode:** ${{ github.event.inputs.offline_mode }}

            ### Testing Local Backend
            If connecting to local backend, use ngrok to expose port 9000:
            ```bash
            ngrok http 9000
            # Copy the https URL and use as api_url input
            ```
          draft: false
          prerelease: false
          fail_on_unmatch: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Verify release created
        run: |
          if [ "${{ steps.create_release.outcome }}" != "success" ]; then
            echo "Release creation failed — attempting cleanup and retry"
            TAG="web-v${{ github.run_number }}"
            # Try to delete any leftover release
            RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" | grep '"id"' | head -1 | sed -E 's/.*"id": *([0-9]+).*/\1/' || true)
            if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ]; then
              curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
              echo "Deleted stale release $TAG"
            fi
            echo "::warning::Release creation had issues — check GitHub for partial release state"
          fi

      - name: Upload release assets with retry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="web-v${{ github.run_number }}"
          REPO="${{ github.repository }}"
          
          # Get upload URL from the release
          UPLOAD_URL=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG" | grep '"upload_url"' | head -1 | sed -E 's/.*"upload_url": *"([^"]+)".*/\1/')
          
          if [ -z "$UPLOAD_URL" ]; then
            echo "::error::Could not get release upload URL"
            exit 1
          fi
          
          echo "Upload URL: $UPLOAD_URL"
          
          # Upload each file with retry
          find build/web -type f | while read -r file; do
            filename=$(basename "$file")
            content_type="application/octet-stream"
            
            # Set appropriate content types
            case "$filename" in
              *.js) content_type="application/javascript" ;;
              *.wasm) content_type="application/wasm" ;;
              *.json) content_type="application/json" ;;
              *.bin) content_type="application/octet-stream" ;;
              *.html) content_type="text/html" ;;
              *.css) content_type="text/css" ;;
              *.png) content_type="image/png" ;;
              *.jpg|*.jpeg) content_type="image/jpeg" ;;
              *.ico) content_type="image/x-icon" ;;
              *.svg) content_type="image/svg+xml" ;;
              *.woff|*.woff2) content_type="font/woff2" ;;
              *.ttf) content_type="font/ttf" ;;
              *.otf) content_type="font/otf" ;;
              *.txt) content_type="text/plain" ;;
              *.xml) content_type="application/xml" ;;
              *.frag|*.vert) content_type="text/plain" ;;
              *.symbols) content_type="application/json" ;;
            esac
            
            echo "⬆️ Uploading $filename ($content_type)..."
            
            # Retry up to 3 times
            for attempt in 1 2 3; do
              response=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: $content_type" \
                -H "Accept: application/vnd.github.v3+json" \
                --data-binary @"$file" \
                "${UPLOAD_URL}?name=$(urlencode "$filename")")
              
              if [ "$response" = "201" ]; then
                echo "✅ $filename uploaded successfully"
                break
              elif [ "$response" = "422" ]; then
                echo "⚠️ $filename already exists (422) — deleting and retrying..."
                # Delete existing asset
                ASSET_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                  "https://api.github.com/repos/$REPO/releases/tags/$TAG" | \
                  grep -A5 "\"name\": *\"$filename\"" | grep '"id"' | head -1 | sed -E 's/.*"id": *([0-9]+).*/\1/' || true)
                if [ -n "$ASSET_ID" ] && [ "$ASSET_ID" != "null" ]; then
                  curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
                    "https://api.github.com/repos/$REPO/releases/assets/$ASSET_ID"
                  echo "🗑️ Deleted existing $filename"
                  sleep 2
                else
                  echo "Could not find asset ID for $filename"
                  break
                fi
              else
                echo "❌ Upload attempt $attempt failed for $filename (HTTP $response)"
                if [ "$attempt" -lt 3 ]; then
                  echo "Retrying in 5s..."
                  sleep 5
                else
                  echo "::warning::Failed to upload $filename after 3 attempts"
                fi
              fi
            done
          done

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: zwesta-web-build
          path: build/web/
          retention-days: 30