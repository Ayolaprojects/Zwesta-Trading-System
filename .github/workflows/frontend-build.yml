name: Frontend Build

# Touching this workflow file is enough to re-run the frontend build when
# backend-only pushes would otherwise miss the path filters below.

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'zwesta-v3-advanced/frontend/**'
      - 'build_deploy.ps1'
      - 'build_deploy2.ps1'
      - 'deploy-vps.ps1'
      - '.github/workflows/frontend-build.yml'
  workflow_dispatch:

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: zwesta-v3-advanced/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
