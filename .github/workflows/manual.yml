name: VPS Health Check

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:

jobs:
  health-check:
    name: Check VPS backend & bots
    runs-on: self-hosted

    steps:
      - name: Backend health
        shell: pwsh
        run: |
          try {
            $r = Invoke-RestMethod "http://127.0.0.1:9000/api/health" -TimeoutSec 10
            Write-Host "OK: $($r | ConvertTo-Json -Compress)"
          } catch {
            Write-Host "FAIL: Backend unreachable — $_"
            exit 1
          }

      - name: Bot status summary
        shell: pwsh
        run: |
          $r = Invoke-RestMethod "http://127.0.0.1:9000/api/bot/status-public" -TimeoutSec 10
          Write-Host "Active bots: $($r.activeBots) / Running: $($r.runningBots)"
          $r.bots | ForEach-Object {
            $flag = if ($_.profit -lt 0) { "LOSS" } else { "OK" }
            Write-Host "  [$flag] $($_.botId) | $($_.status) | profit=$($_.profit) | trades=$($_.totalTrades)"
          }

      - name: Restart if backend is down
        if: failure()
        shell: pwsh
        run: |
          Write-Host "Backend appears down — attempting restart"
          Start-Process -FilePath "C:\backend\start_watchdog.bat" `
                        -WorkingDirectory "C:\backend" `
                        -WindowStyle Hidden
          Start-Sleep -Seconds 10
          Invoke-RestMethod "http://127.0.0.1:9000/api/health" -TimeoutSec 10

